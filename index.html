<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚔️ Espada e Escudo - Controle 3D ⚔️</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; }
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 10px;
            color: #ffd700;
            z-index: 10;
            font-weight: bold;
            border: 1px solid #ffd700;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            z-index: 10;
            border: 1px solid #00ff88;
        }
        .controls span { color: #ffd700; font-weight: bold; }
        .status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 10px;
            color: #00ff88;
            z-index: 10;
            text-align: center;
            border: 1px solid #00ff88;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px 50px;
            border-radius: 20px;
            color: #ffd700;
            font-size: 20px;
            z-index: 100;
            text-align: center;
            border: 2px solid #ffd700;
        }
        @media (max-width: 768px) {
            .info, .controls, .status { font-size: 10px; padding: 8px 12px; }
        }
    </style>
</head>
<body>
    <div class="info">⚔️ ESPADA & ESCUDO ⚔️</div>
    <div class="controls">🎮 <span>W A S D</span> ou <span>SETAS</span> para mover</div>
    <div class="status">📍 POS: <span id="posX">0</span> , <span id="posZ">0</span></div>
    <div class="loading" id="loading">🔄 CARREGANDO MODELOS...<br>⚔️ Espada e Escudo ⚔️</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';

        // ========== CONFIGURAÇÃO DA CENA ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3.5, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // ========== LUZES ==========
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x4466ff, 0.3);
        fillLight.position.set(-2, 3, 4);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xff6600, 0.2);
        backLight.position.set(0, 2, -5);
        scene.add(backLight);

        // ========== CHÃO ==========
        const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.8;
        scene.add(gridHelper);
        
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.7 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.85;
        ground.receiveShadow = true;
        scene.add(ground);

        // ========== ⚠️ MUDE AQUI OS NOMES DOS ARQUIVOS! ⚠️ ==========
        // Coloque o nome EXATO que está dentro do seu arquivo ZIP
        const PERSONAGEM_URL = '/models/personagem.glb';   // ← MUDE AQUI
        const ESPADA_URL = '/models/espada.glb';           // ← MUDE AQUI  
        const ESCUDO_URL = '/models/escudo.glb';           // ← MUDE AQUI
        // =====================================================

        let character = null;
        let sword = null;
        let shield = null;
        let mixer = null;
        let currentAction = null;
        
        let posX = 0, posZ = 0;
        const MOVE_SPEED = 3.5;
        const BOUNDS = 8;
        
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, s: false, a: false, d: false };
        
        let loadedCount = 0;
        const totalToLoad = 3;
        
        function itemLoaded() {
            loadedCount++;
            if (loadedCount === totalToLoad) {
                document.getElementById('loading').style.display = 'none';
                console.log('✅ TODOS OS MODELOS CARREGADOS!');
            }
        }
        
        const loader = new GLTFLoader();
        
        // ========== CARREGAR PERSONAGEM ==========
        loader.load(PERSONAGEM_URL, (gltf) => {
            character = gltf.scene;
            character.position.set(0, -0.7, 0);
            character.castShadow = true;
            character.receiveShadow = true;
            scene.add(character);
            
            character.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            // Configurar animações se existirem
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(character);
                const action = mixer.clipAction(gltf.animations[0]);
                currentAction = action;
                action.play();
                console.log('📽️ Animações encontradas e reproduzindo!');
            } else {
                console.log('ℹ️ Modelo sem animações');
            }
            
            console.log('✅ Personagem carregado:', PERSONAGEM_URL);
            itemLoaded();
        }, undefined, (error) => {
            console.error('❌ Erro ao carregar personagem:', error);
            document.getElementById('loading').innerHTML = '❌ ERRO!<br>Verifique o nome do arquivo:<br>' + PERSONAGEM_URL;
        });
        
        // ========== CARREGAR ESPADA ==========
        loader.load(ESPADA_URL, (gltf) => {
            sword = gltf.scene;
            sword.castShadow = true;
            // Anexar ao personagem (se já carregado)
            if (character) {
                character.add(sword);
                sword.position.set(0.6, 0.8, 0.3);
                sword.rotation.z = -0.3;
            } else {
                scene.add(sword);
                // Esperar personagem carregar para anexar
                const checkInterval = setInterval(() => {
                    if (character) {
                        character.add(sword);
                        sword.position.set(0.6, 0.8, 0.3);
                        sword.rotation.z = -0.3;
                        clearInterval(checkInterval);
                    }
                }, 100);
            }
            console.log('✅ Espada carregada:', ESPADA_URL);
            itemLoaded();
        }, undefined, (error) => {
            console.error('❌ Erro ao carregar espada:', error);
            itemLoaded();
        });
        
        // ========== CARREGAR ESCUDO ==========
        loader.load(ESCUDO_URL, (gltf) => {
            shield = gltf.scene;
            shield.castShadow = true;
            if (character) {
                character.add(shield);
                shield.position.set(-0.6, 0.7, 0.2);
                shield.rotation.z = 0.2;
            } else {
                scene.add(shield);
                const checkInterval = setInterval(() => {
                    if (character) {
                        character.add(shield);
                        shield.position.set(-0.6, 0.7, 0.2);
                        shield.rotation.z = 0.2;
                        clearInterval(checkInterval);
                    }
                }, 100);
            }
            console.log('✅ Escudo carregado:', ESCUDO_URL);
            itemLoaded();
        }, undefined, (error) => {
            console.error('❌ Erro ao carregar escudo:', error);
            itemLoaded();
        });
        
        // ========== MOVIMENTO ==========
        function updateMovement() {
            let moveX = 0, moveZ = 0;
            
            if (keys.ArrowUp || keys.w) moveZ -= 1;
            if (keys.ArrowDown || keys.s) moveZ += 1;
            if (keys.ArrowLeft || keys.a) moveX -= 1;
            if (keys.ArrowRight || keys.d) moveX += 1;
            
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
            }
            
            posX += moveX * MOVE_SPEED * 0.016;
            posZ += moveZ * MOVE_SPEED * 0.016;
            
            posX = Math.max(-BOUNDS, Math.min(BOUNDS, posX));
            posZ = Math.max(-BOUNDS, Math.min(BOUNDS, posZ));
            
            if (character) {
                character.position.x = posX;
                character.position.z = posZ;
                
                if (moveX !== 0 || moveZ !== 0) {
                    const angle = Math.atan2(moveX, moveZ);
                    character.rotation.y = angle;
                }
            }
            
            // Câmera segue
            camera.position.x += (posX * 0.3 - camera.position.x) * 0.05;
            camera.position.z += (posZ * 0.3 - camera.position.z) * 0.05;
            camera.lookAt(character ? character.position : new THREE.Vector3(0, 0, 0));
            
            document.getElementById('posX').textContent = posX.toFixed(1);
            document.getElementById('posZ').textContent = posZ.toFixed(1);
        }
        
        // ========== EVENTOS DE TECLADO ==========
        window.addEventListener('keydown', (e) => {
            const code = e.key;
            if (keys.hasOwnProperty(code)) { keys[code] = true; e.preventDefault(); }
            if (code === 'ArrowUp') keys.ArrowUp = true;
            if (code === 'ArrowDown') keys.ArrowDown = true;
            if (code === 'ArrowLeft') keys.ArrowLeft = true;
            if (code === 'ArrowRight') keys.ArrowRight = true;
            if (code === 'w') keys.w = true;
            if (code === 's') keys.s = true;
            if (code === 'a') keys.a = true;
            if (code === 'd') keys.d = true;
        });
        
        window.addEventListener('keyup', (e) => {
            const code = e.key;
            if (code === 'ArrowUp') keys.ArrowUp = false;
            if (code === 'ArrowDown') keys.ArrowDown = false;
            if (code === 'ArrowLeft') keys.ArrowLeft = false;
            if (code === 'ArrowRight') keys.ArrowRight = false;
            if (code === 'w') keys.w = false;
            if (code === 's') keys.s = false;
            if (code === 'a') keys.a = false;
            if (code === 'd') keys.d = false;
        });
        
        // ========== ANIMAÇÃO ==========
        let lastTime = 0;
        
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            const delta = Math.min(0.033, (currentTime - lastTime) / 1000);
            lastTime = currentTime;
            
            updateMovement();
            
            if (mixer) mixer.update(delta);
            
            renderer.render(scene, camera);
        }
        
        requestAnimationFrame(animate);
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('🎮 Jogo iniciado! Use WASD ou setas para mover o personagem!');
        console.log('📁 Arquivos esperados:', PERSONAGEM_URL, ESPADA_URL, ESCUDO_URL);
    </script>
</body>
</html>
