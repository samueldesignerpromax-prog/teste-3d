<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚔️ Cavaleiro - Espada e Escudo ⚔️</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 10px;
            color: #ffd700;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            border: 2px solid #ffd700;
            backdrop-filter: blur(5px);
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            z-index: 10;
            pointer-events: none;
            font-size: 14px;
            border: 2px solid #00ff88;
        }

        .controls span {
            color: #ffd700;
            font-weight: bold;
        }

        .status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 10px;
            color: #00ff88;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            border: 2px solid #00ff88;
            text-align: center;
        }

        .attack-status {
            position: absolute;
            bottom: 100px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 10px;
            color: #ff6666;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            border: 2px solid #ff6666;
            font-size: 18px;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px 50px;
            border-radius: 20px;
            color: #ffd700;
            font-size: 24px;
            z-index: 100;
            text-align: center;
            border: 2px solid #ffd700;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        .controls-mobile {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 20;
        }

        .mobile-btn {
            background: rgba(0,0,0,0.8);
            border: 2px solid #ffd700;
            border-radius: 50px;
            padding: 15px 20px;
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
        }

        .mobile-btn:active {
            background: #ffd700;
            color: #000;
        }

        @media (max-width: 768px) {
            .controls { display: none; }
            .info, .status { font-size: 12px; padding: 8px 12px; }
            .mobile-btn { padding: 10px 15px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="info">
        ⚔️ CAVALEIRO - ESPADA & ESCUDO ⚔️
    </div>
    <div class="controls">
        🎮 <span>W A S D</span> ou <span>SETAS</span> para mover<br>
        🖱️ <span>CLIQUE</span> na tela para ativar o teclado
    </div>
    <div class="status">
        📍 POSIÇÃO<br>
        X: <span id="posX">0</span> | Z: <span id="posZ">0</span>
    </div>
    <div class="attack-status" id="attackStatus">
        🗡️ PRESSIONE J PARA ATACAR 🗡️
    </div>
    <div class="controls-mobile">
        <button class="mobile-btn" id="btnUp">▲</button>
        <button class="mobile-btn" id="btnLeft">◀</button>
        <button class="mobile-btn" id="btnDown">▼</button>
        <button class="mobile-btn" id="btnRight">▶</button>
        <button class="mobile-btn" id="btnAttack">⚔️</button>
    </div>

    <div class="loading" id="loading">
        🔄 CRIANDO CAVALEIRO...<br>
        ⚔️ Espada e Escudo ⚔️
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ========== CONFIGURAÇÕES INICIAIS ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 4, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // ========== LUZES ==========
        // Luz ambiente
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);

        // Luz principal
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        mainLight.position.set(5, 12, 5);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);

        // Luz de preenchimento
        const fillLight = new THREE.PointLight(0x4466ff, 0.4);
        fillLight.position.set(-3, 4, 4);
        scene.add(fillLight);

        // Luz traseira
        const backLight = new THREE.PointLight(0xff6600, 0.3);
        backLight.position.set(0, 2, -5);
        scene.add(backLight);

        // Luz no chão
        const groundLight = new THREE.PointLight(0xff6600, 0.3);
        groundLight.position.set(0, -0.5, 0);
        scene.add(groundLight);

        // ========== CENÁRIO ==========
        // Grade de referência
        const gridHelper = new THREE.GridHelper(25, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.8;
        scene.add(gridHelper);

        // Chão
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.7, metalness: 0.1 });
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(25, 25), groundMat);
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.85;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);

        // Círculo decorativo no chão
        const circleMat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0x442200, emissiveIntensity: 0.3 });
        const circle = new THREE.Mesh(new THREE.RingGeometry(1, 1.5, 32), circleMat);
        circle.rotation.x = -Math.PI / 2;
        circle.position.y = -0.8;
        scene.add(circle);

        // ========== CRIAR PERSONAGEM (CAVALEIRO) ==========
        const character = new THREE.Group();

        // Corpo (armadura)
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, metalness: 0.7, roughness: 0.3 });
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1, 0.6), bodyMat);
        body.position.y = 0.5;
        body.castShadow = true;
        character.add(body);

        // Cabeça (elmo)
        const helmetMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, metalness: 0.8 });
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), helmetMat);
        head.position.y = 1.05;
        head.castShadow = true;
        character.add(head);

        // Visor do elmo
        const visorMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.15, 0.1), visorMat);
        visor.position.set(0, 1.02, 0.45);
        character.add(visor);
        
        // Pluma no elmo
        const plumeMat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
        const plume = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.35, 8), plumeMat);
        plume.position.set(0, 1.35, 0.2);
        character.add(plume);

        // Braços
        const armMat = new THREE.MeshStandardMaterial({ color: 0x66bbff, metalness: 0.6 });
        
        // Braço esquerdo
        const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.35), armMat);
        leftArm.position.set(-0.55, 0.85, 0);
        leftArm.castShadow = true;
        character.add(leftArm);
        
        // Braço direito
        const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.35), armMat);
        rightArm.position.set(0.55, 0.85, 0);
        rightArm.castShadow = true;
        character.add(rightArm);

        // Pernas
        const legMat = new THREE.MeshStandardMaterial({ color: 0x3388cc, metalness: 0.5 });
        
        const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.5, 0.4), legMat);
        leftLeg.position.set(-0.3, 0.25, 0);
        leftLeg.castShadow = true;
        character.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.5, 0.4), legMat);
        rightLeg.position.set(0.3, 0.25, 0);
        rightLeg.castShadow = true;
        character.add(rightLeg);

        // Capa
        const capeMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, metalness: 0.1 });
        const cape = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.8, 0.2), capeMat);
        cape.position.set(0, 0.6, -0.45);
        cape.castShadow = true;
        character.add(cape);

        // ========== ESPADA ==========
        const swordGroup = new THREE.Group();
        
        // Lâmina
        const bladeMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, metalness: 0.9, emissive: 0x224466, emissiveIntensity: 0.2 });
        const blade = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.9), bladeMat);
        blade.position.y = 0.45;
        swordGroup.add(blade);
        
        // Ponta da espada
        const tip = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.15, 8), bladeMat);
        tip.position.y = 0.88;
        swordGroup.add(tip);
        
        // Cabo
        const handleMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const handle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.2), handleMat);
        handle.position.y = -0.05;
        swordGroup.add(handle);
        
        // Cruzada
        const crossMat = new THREE.MeshStandardMaterial({ color: 0xffd700 });
        const cross1 = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.05, 0.05), crossMat);
        cross1.position.y = 0;
        swordGroup.add(cross1);
        
        const cross2 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.25, 0.05), crossMat);
        cross2.position.y = 0;
        swordGroup.add(cross2);
        
        // Gema na espada
        const gemMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x440000 });
        const gem = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), gemMat);
        gem.position.y = 0.15;
        swordGroup.add(gem);
        
        swordGroup.position.set(0.6, 0.65, 0.25);
        swordGroup.rotation.z = -0.3;
        swordGroup.rotation.x = 0.2;
        character.add(swordGroup);

        // ========== ESCUDO ==========
        const shieldGroup = new THREE.Group();
        
        // Corpo do escudo
        const shieldMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, metalness: 0.7 });
        const shieldBody = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.08, 8), shieldMat);
        shieldBody.rotation.x = Math.PI / 2;
        shieldBody.scale.set(1, 1.2, 1);
        shieldGroup.add(shieldBody);
        
        // Borda dourada
        const borderMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8 });
        const border = new THREE.Mesh(new THREE.TorusGeometry(0.52, 0.05, 16, 32), borderMat);
        border.rotation.x = Math.PI / 2;
        border.scale.set(1, 1.2, 1);
        shieldGroup.add(border);
        
        // Detalhe central
        const center = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), borderMat);
        center.position.z = 0.04;
        shieldGroup.add(center);
        
        // Gema no escudo
        const shieldGem = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), gemMat);
        shieldGem.position.z = 0.06;
        shieldGroup.add(shieldGem);
        
        shieldGroup.position.set(-0.6, 0.65, 0.2);
        shieldGroup.rotation.z = 0.2;
        character.add(shieldGroup);

        character.position.set(0, -0.7, 0);
        character.castShadow = true;
        character.receiveShadow = true;
        scene.add(character);

        // ========== DECORAÇÕES NO CENÁRIO ==========
        // Tochas
        const torchMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff3300 });
        
        function addTorch(x, z) {
            const torchGroup = new THREE.Group();
            const pole = new THREE.Mesh(new THREE.BoxGeometry(0.15, 1.5, 0.15), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
            pole.position.y = 0.75;
            torchGroup.add(pole);
            
            const flame = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.4, 8), torchMat);
            flame.position.y = 1.55;
            torchGroup.add(flame);
            
            const flameLight = new THREE.PointLight(0xff6600, 0.5, 8);
            flameLight.position.y = 1.55;
            torchGroup.add(flameLight);
            
            torchGroup.position.set(x, -0.7, z);
            scene.add(torchGroup);
            
            // Animar chama
            setInterval(() => {
                flame.scale.setScalar(0.8 + Math.random() * 0.4);
            }, 100);
        }
        
        addTorch(-5, -5);
        addTorch(5, -5);
        addTorch(-5, 5);
        addTorch(5, 5);
        addTorch(0, -6);
        addTorch(0, 6);

        // ========== INIMIGO ESTÁTICO (ALVO) ==========
        const enemyGroup = new THREE.Group();
        
        const enemyBody = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.9, 0.6), new THREE.MeshStandardMaterial({ color: 0xff4444, metalness: 0.3 }));
        enemyBody.position.y = 0.45;
        enemyGroup.add(enemyBody);
        
        const enemyHead = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({ color: 0xcc3333 }));
        enemyHead.position.y = 0.95;
        enemyGroup.add(enemyHead);
        
        const enemyEyes = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        enemyEyes.position.set(0.15, 1.02, 0.4);
        enemyGroup.add(enemyEyes);
        
        const enemyPupil = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshStandardMaterial({ color: 0x000000 }));
        enemyPupil.position.set(0.17, 1, 0.48);
        enemyGroup.add(enemyPupil);
        
        const enemyEyes2 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        enemyEyes2.position.set(-0.15, 1.02, 0.4);
        enemyGroup.add(enemyEyes2);
        
        const enemyPupil2 = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshStandardMaterial({ color: 0x000000 }));
        enemyPupil2.position.set(-0.13, 1, 0.48);
        enemyGroup.add(enemyPupil2);
        
        enemyGroup.position.set(3, -0.7, 3);
        enemyGroup.castShadow = true;
        scene.add(enemyGroup);

        // ========== VARIAVEIS DE MOVIMENTO ==========
        let position_x = 0;
        let position_z = 0;
        const MOVE_SPEED = 3.5;
        const BOUNDS = 10;
        
        // Estado das teclas
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            KeyW: false, KeyS: false, KeyA: false, KeyD: false
        };
        
        let isAttacking = false;
        let attackTimer = 0;
        
        // ========== FUNÇÕES ==========
        function updatePosition() {
            let moveX = 0;
            let moveZ = 0;
            
            if (keys.ArrowUp || keys.KeyW) moveZ -= 1;
            if (keys.ArrowDown || keys.KeyS) moveZ += 1;
            if (keys.ArrowLeft || keys.KeyA) moveX -= 1;
            if (keys.ArrowRight || keys.KeyD) moveX += 1;
            
            if (moveX !== 0 || moveZ !== 0) {
                const length = Math.hypot(moveX, moveZ);
                moveX /= length;
                moveZ /= length;
            }
            
            position_x += moveX * MOVE_SPEED * 0.016;
            position_z += moveZ * MOVE_SPEED * 0.016;
            
            // Limites
            position_x = Math.max(-BOUNDS, Math.min(BOUNDS, position_x));
            position_z = Math.max(-BOUNDS, Math.min(BOUNDS, position_z));
            
            character.position.x = position_x;
            character.position.z = position_z;
            
            // Rotação do personagem baseado no movimento
            if (moveX !== 0 || moveZ !== 0) {
                const angle = Math.atan2(moveX, moveZ);
                character.rotation.y = angle;
                
                // Animação das pernas (movimento)
                const legSwing = Math.sin(Date.now() * 0.015) * 0.15;
                leftLeg.position.x = -0.3 + legSwing * 0.1;
                rightLeg.position.x = 0.3 - legSwing * 0.1;
            } else {
                // Voltar pernas ao normal
                leftLeg.position.x = -0.3;
                rightLeg.position.x = 0.3;
            }
            
            // Atualizar UI
            document.getElementById('posX').textContent = position_x.toFixed(1);
            document.getElementById('posZ').textContent = position_z.toFixed(1);
            
            // Câmera segue o personagem
            camera.position.x += (position_x * 0.3 - camera.position.x) * 0.05;
            camera.position.z += (position_z * 0.3 - camera.position.z) * 0.05;
            camera.lookAt(character.position);
            
            // Luz segue o personagem
            groundLight.position.x = position_x;
            groundLight.position.z = position_z;
            
            // Verificar distância do inimigo
            const dx = enemyGroup.position.x - position_x;
            const dz = enemyGroup.position.z - position_z;
            const distance = Math.hypot(dx, dz);
            
            if (distance < 1.5 && !isAttacking) {
                document.getElementById('attackStatus').innerHTML = '⚠️ INIMIGO PRÓXIMO! PRESSIONE J ⚠️';
                document.getElementById('attackStatus').style.color = '#ff6666';
                document.getElementById('attackStatus').style.borderColor = '#ff6666';
            } else if (!isAttacking) {
                document.getElementById('attackStatus').innerHTML = '🗡️ PRESSIONE J PARA ATACAR 🗡️';
                document.getElementById('attackStatus').style.color = '#ffd700';
                document.getElementById('attackStatus').style.borderColor = '#ffd700';
            }
        }
        
        function attack() {
            if (isAttacking) return;
            
            isAttacking = true;
            attackTimer = 15;
            
            // Animação da espada
            swordGroup.rotation.x = -0.8;
            swordGroup.rotation.z = 0.5;
            
            document.getElementById('attackStatus').innerHTML = '⚔️ ATAQUE! ⚔️';
            document.getElementById('attackStatus').style.color = '#ff4444';
            document.getElementById('attackStatus').style.borderColor = '#ff4444';
            
            // Verificar acerto no inimigo
            const dx = enemyGroup.position.x - position_x;
            const dz = enemyGroup.position.z - position_z;
            const distance = Math.hypot(dx, dz);
            
            if (distance < 1.8) {
                // Acertou o inimigo!
                enemyGroup.position.x = (Math.random() - 0.5) * 8;
                enemyGroup.position.z = (Math.random() - 0.5) * 8;
                
                // Efeito visual de acerto
                const hitEffect = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff4400 }));
                hitEffect.position.copy(enemyGroup.position);
                hitEffect.position.y = 0.5;
                scene.add(hitEffect);
                setTimeout(() => scene.remove(hitEffect), 300);
                
                // Piscar inimigo
                enemyGroup.children.forEach(child => {
                    if (child.material) {
                        const originalColor = child.material.color.getHex();
                        child.material.color.setHex(0xff8888);
                        setTimeout(() => child.material.color.setHex(originalColor), 200);
                    }
                });
                
                document.getElementById('attackStatus').innerHTML = '💥 ACERTOU! +10 PONTOS 💥';
                setTimeout(() => {
                    if (!isAttacking) {
                        document.getElementById('attackStatus').innerHTML = '🗡️ PRESSIONE J PARA ATACAR 🗡️';
                    }
                }, 500);
            }
            
            setTimeout(() => {
                swordGroup.rotation.x = 0.2;
                swordGroup.rotation.z = -0.3;
                isAttacking = false;
                document.getElementById('attackStatus').innerHTML = '🗡️ PRESSIONE J PARA ATACAR 🗡️';
                document.getElementById('attackStatus').style.color = '#ffd700';
                document.getElementById('attackStatus').style.borderColor = '#ffd700';
            }, 300);
        }
        
        // ========== EVENTOS DE TECLADO ==========
        window.addEventListener('keydown', (e) => {
            const code = e.code;
            if (keys.hasOwnProperty(code)) {
                keys[code] = true;
                e.preventDefault();
            }
            if (code === 'KeyJ') {
                attack();
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            const code = e.code;
            if (keys.hasOwnProperty(code)) {
                keys[code] = false;
                e.preventDefault();
            }
        });
        
        // ========== BOTÕES MOBILE ==========
        document.getElementById('btnUp').addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowUp = true; });
        document.getElementById('btnUp').addEventListener('touchend', () => { keys.ArrowUp = false; });
        document.getElementById('btnDown').addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowDown = true; });
        document.getElementById('btnDown').addEventListener('touchend', () => { keys.ArrowDown = false; });
        document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowLeft = true; });
        document.getElementById('btnLeft').addEventListener('touchend', () => { keys.ArrowLeft = false; });
        document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowRight = true; });
        document.getElementById('btnRight').addEventListener('touchend', () => { keys.ArrowRight = false; });
        document.getElementById('btnAttack').addEventListener('click', () => attack());
        
        // Versão mouse para os botões
        document.getElementById('btnUp').addEventListener('mousedown', () => { keys.ArrowUp = true; });
        document.getElementById('btnUp').addEventListener('mouseup', () => { keys.ArrowUp = false; });
        document.getElementById('btnDown').addEventListener('mousedown', () => { keys.ArrowDown = true; });
        document.getElementById('btnDown').addEventListener('mouseup', () => { keys.ArrowDown = false; });
        document.getElementById('btnLeft').addEventListener('mousedown', () => { keys.ArrowLeft = true; });
        document.getElementById('btnLeft').addEventListener('mouseup', () => { keys.ArrowLeft = false; });
        document.getElementById('btnRight').addEventListener('mousedown', () => { keys.ArrowRight = true; });
        document.getElementById('btnRight').addEventListener('mouseup', () => { keys.ArrowRight = false; });
        
        // Ativar teclado clicando na tela
        window.addEventListener('click', () => {
            // apenas para garantir foco
        });
        
        // ========== ANIMAÇÃO ==========
        let lastTime = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            
            updatePosition();
            
            // Animar tochas
            const time = Date.now() * 0.005;
            circle.rotation.z = time * 0.5;
            
            // Animar espada quando atacando
            if (isAttacking) {
                attackTimer--;
                if (attackTimer > 0) {
                    const swing = Math.sin(attackTimer * 0.8) * 0.3;
                    swordGroup.rotation.x = -0.5 + swing;
                }
            }
            
            renderer.render(scene, camera);
        }
        
        // Esconder loading após 1 segundo
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 1500);
        
        animate();
        
        // Ajustar tela
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('⚔️ Jogo criado! Use WASD ou setas para mover, J para atacar!');
    </script>
</body>
</html>
